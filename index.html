<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemma Chatbot</title>
    <!-- Tailwind CSS for modern, responsive styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <style>
        /* Custom scrollbar for the chat area */
        .chat-scroll::-webkit-scrollbar { width: 6px; }
        .chat-scroll::-webkit-scrollbar-track { background: transparent; }
        .chat-scroll::-webkit-scrollbar-thumb { background-color: #cbd5e1; border-radius: 20px; }
        .typing-indicator span {
            animation: blink 1.4s infinite both;
            height: 6px; width: 6px; background: #94a3b8; border-radius: 50%; display: inline-block; margin: 0 1px;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        .markdown-body h1 { font-size: 1.5rem; font-weight: 700; margin: 1rem 0 0.5rem; }
        .markdown-body h2 { font-size: 1.25rem; font-weight: 700; margin: 1rem 0 0.5rem; }
        .markdown-body h3 { font-size: 1.1rem; font-weight: 700; margin: 0.9rem 0 0.4rem; }
        .markdown-body p { margin: 0.5rem 0; }
        .markdown-body ul { list-style: disc; padding-left: 1.5rem; margin: 0.5rem 0; }
        .markdown-body ol { list-style: decimal; padding-left: 1.5rem; margin: 0.5rem 0; }
        .markdown-body li { margin: 0.25rem 0; }
        .markdown-body strong { font-weight: 700; }
        .markdown-body blockquote { border-left: 3px solid #cbd5e1; padding-left: 0.75rem; color: #475569; margin: 0.75rem 0; }
        .markdown-body code { background: #f1f5f9; border-radius: 0.25rem; padding: 0.1rem 0.3rem; font-family: ui-monospace, monospace; }
        .markdown-body pre { background: #0f172a; color: #e2e8f0; border-radius: 0.5rem; padding: 0.75rem; overflow-x: auto; margin: 0.75rem 0; }
        .markdown-body pre code { background: transparent; padding: 0; }
        .markdown-body > :first-child { margin-top: 0; }
        .markdown-body > :last-child { margin-bottom: 0; }
        @keyframes blink { 0% { opacity: 0.2; } 20% { opacity: 1; } 100% { opacity: 0.2; } }
    </style>
</head>
<body class="bg-slate-50 h-screen flex flex-col font-sans">

    <header class="bg-white border-b border-slate-200 px-6 py-4 flex flex-col sm:flex-row justify-between items-center gap-4 shadow-sm z-10">
        <div class="flex items-center gap-3">
            <div class="bg-blue-600 p-2 rounded-lg text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
            </div>
            <div>
                <h1 class="text-xl font-bold text-slate-800 tracking-tight">Gemma Chat</h1>
                <p class="text-xs text-slate-500">Powered by Hugging Face Inference API</p>
            </div>
        </div>

        <!-- API Key Input Area -->
        <div class="flex items-center gap-2 w-full sm:w-auto">
            <input type="password" id="hf-token" placeholder="Paste Hugging Face Token (hf_...)" 
                class="flex-1 sm:w-64 text-sm px-3 py-2 border border-slate-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-shadow">
            <select id="model-select" class="text-sm px-3 py-2 border border-slate-300 rounded-md bg-white focus:outline-none focus:ring-2 focus:ring-blue-500 cursor-pointer">
                <option value="google/gemma-2-2b-it:featherless-ai">Gemma 2 (2B via Featherless AI)</option>
                <option value="google/gemma-4-31B-it:cerebras">Gemma 4 (31B via Cerebras)</option>
            </select>
        </div>
    </header>

    <main class="flex-1 overflow-hidden flex flex-col max-w-4xl w-full mx-auto px-4 py-6">
        <!-- Chat History -->
        <div id="chat-container" class="flex-1 overflow-y-auto chat-scroll flex flex-col gap-4 pb-4 px-2">
            <!-- Welcome Message -->
            <div class="flex items-start gap-3">
                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center shrink-0 border border-blue-200">
                    <span class="text-blue-600 text-xs font-bold">G</span>
                </div>
                <div class="bg-white border border-slate-200 rounded-2xl rounded-tl-none px-4 py-3 shadow-sm max-w-[85%] text-slate-700 text-sm leading-relaxed">
                    Hello! I'm ready to chat. Please ensure you've pasted your Hugging Face Access Token in the top right before we begin!
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="mt-4 bg-white border border-slate-200 rounded-xl shadow-sm p-2 flex items-end gap-2 focus-within:ring-2 focus-within:ring-blue-500 focus-within:border-blue-500 transition-shadow relative">
            <textarea id="message-input" rows="1" placeholder="Message Gemma..." 
                class="flex-1 max-h-32 resize-none bg-transparent border-none focus:ring-0 p-2 text-sm text-slate-800 placeholder-slate-400"></textarea>
            
            <button id="send-btn" class="mb-1 mr-1 p-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg transition-colors flex items-center justify-center disabled:opacity-50 disabled:cursor-not-allowed">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
            </button>
        </div>
    </main>

    <script>
        const chatContainer = document.getElementById('chat-container');
        const messageInput = document.getElementById('message-input');
        const sendBtn = document.getElementById('send-btn');
        const tokenInput = document.getElementById('hf-token');
        const modelSelect = document.getElementById('model-select');

        // Store conversation history for context
        let conversationHistory = [];

        // Auto-resize textarea
        messageInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
            if(this.value.trim() === '') this.style.height = 'auto';
        });

        // Handle Enter key (Shift+Enter for new line)
        messageInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        });

        sendBtn.addEventListener('click', sendMessage);

        async function sendMessage() {
            const text = messageInput.value.trim();
            const token = tokenInput.value.trim();
            const modelId = modelSelect.value;

            if (!text) return;
            if (!token) {
                alert("Please enter your Hugging Face API Token in the top right corner.");
                tokenInput.focus();
                return;
            }

            // 1. Add User Message to UI
            appendMessage('user', text);
            messageInput.value = '';
            messageInput.style.height = 'auto';
            
            // Add to internal history
            conversationHistory.push({ role: 'user', content: text });

            // 2. Add Loading Indicator
            const typingId = appendTypingIndicator();
            scrollToBottom();

            try {
                // 3. Call Hugging Face's OpenAI-compatible router API
                const response = await fetch('https://router.huggingface.co/v1/chat/completions', {
                    method: "POST",
                    headers: {
                        "Authorization": `Bearer ${token}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: modelId,
                        messages: conversationHistory,
                        temperature: 0.7,
                        top_p: 0.9,
                        max_tokens: 2048,
                        stream: false
                    })
                });

                removeElement(typingId);

                if (!response.ok) {
                    throw await buildHuggingFaceError(response, modelId);
                }

                const result = await response.json();
                
                const choice = result?.choices?.[0];
                const generatedText = choice?.message?.content?.trim();
                if (!generatedText) {
                    if (choice?.finish_reason === "length") {
                        throw new ChatbotError("Response was cut off", "The model reached the response limit before it could finish. Try a shorter question or ask for a shorter answer.");
                    }
                    throw new ChatbotError("Unexpected API response", "Hugging Face returned a response, but it did not contain a readable assistant message. Try another model/provider from the dropdown.");
                }

                // 5. Append Model Response to UI
                appendMessage('model', generatedText);
                conversationHistory.push({ role: 'assistant', content: generatedText });

            } catch (error) {
                removeElement(typingId);
                appendMessage('error', formatErrorForDisplay(error));
                // Remove failed user message from history
                conversationHistory.pop(); 
            }

            scrollToBottom();
        }

        class ChatbotError extends Error {
            constructor(title, message, details = "") {
                super(message);
                this.name = "ChatbotError";
                this.title = title;
                this.details = details;
            }
        }

        async function buildHuggingFaceError(response, modelId) {
            const rawText = await response.text();
            const apiMessage = extractApiErrorMessage(rawText);
            const status = response.status;

            if (status === 401 || /invalid username|invalid token|unauthorized|authentication/i.test(apiMessage)) {
                return new ChatbotError(
                    "Invalid Hugging Face token",
                    "Your token is missing, expired, or does not have Inference Providers access.",
                    "Create a Hugging Face token with inference/provider access, paste it again, then retry."
                );
            }

            if (status === 402 || /credit|billing|payment|quota/i.test(apiMessage)) {
                return new ChatbotError(
                    "Free credits or billing limit reached",
                    "Hugging Face could not run this request because your available inference credits may be finished.",
                    "Try a cheaper/free provider model, wait for credits to reset, or add billing credits in Hugging Face."
                );
            }

            if (status === 403 || /permission|gated|access|not authorized/i.test(apiMessage)) {
                return new ChatbotError(
                    "Model access denied",
                    `Your token works, but it does not have permission to use ${modelId}.`,
                    "If the model is gated, open its Hugging Face model page, accept the license/access request, then try again."
                );
            }

            if (status === 404 || /not supported by any provider|provider|not found|does not exist/i.test(apiMessage)) {
                return new ChatbotError(
                    "Model/provider not available",
                    `${modelId} is not available through your enabled Hugging Face Inference Provider right now.`,
                    "Choose another model from the dropdown or use the exact provider suffix shown on Hugging Face, for example model-name:provider-name."
                );
            }

            if (status === 429 || /rate limit|too many requests|temporarily overloaded/i.test(apiMessage)) {
                return new ChatbotError(
                    "Too many requests",
                    "The provider is rate-limiting requests at the moment.",
                    "Wait a minute and try again, or switch to another provider/model."
                );
            }

            if (status === 500 || status === 502 || status === 503 || status === 504 || /loading|cold start|unavailable|timeout/i.test(apiMessage)) {
                return new ChatbotError(
                    "Provider is temporarily unavailable",
                    "The model/provider may be loading, busy, or temporarily down.",
                    "Wait 1-2 minutes and retry. If it keeps happening, choose another model/provider."
                );
            }

            return new ChatbotError(
                `Hugging Face API error (${status})`,
                apiMessage || "The request failed, but Hugging Face did not return a clear error message.",
                rawText && rawText !== apiMessage ? rawText : ""
            );
        }

        function extractApiErrorMessage(rawText) {
            if (!rawText) return "";

            try {
                const parsed = JSON.parse(rawText);
                const apiError = parsed.error ?? parsed.message ?? parsed.detail;

                if (typeof apiError === "string") return apiError;
                if (apiError?.message) return apiError.message;
                if (Array.isArray(apiError)) return apiError.map(item => item?.msg || item?.message || JSON.stringify(item)).join("\n");
                if (apiError) return JSON.stringify(apiError);

                return JSON.stringify(parsed);
            } catch {
                return rawText;
            }
        }

        function formatErrorForDisplay(error) {
            if (error instanceof TypeError && /failed to fetch|networkerror/i.test(error.message)) {
                return [
                    "Network error",
                    "",
                    "The browser could not reach Hugging Face.",
                    "",
                    "Try these:",
                    "- Check your internet connection.",
                    "- Turn off VPN/proxy temporarily.",
                    "- If you opened the file directly, try hosting it with GitHub Pages or Hugging Face Spaces.",
                    "- Confirm your browser is not blocking requests to router.huggingface.co."
                ].join("\n");
            }

            if (error instanceof ChatbotError) {
                return [
                    error.title,
                    "",
                    error.message,
                    error.details ? `\nWhat to do:\n- ${error.details}` : ""
                ].join("\n").trim();
            }

            return [
                "Something went wrong",
                "",
                error?.message || "Unknown error. Please try again."
            ].join("\n");
        }

        // Helper UI Functions
        function appendMessage(role, text) {
            const isUser = role === 'user';
            const isError = role === 'error';
            
            const div = document.createElement('div');
            div.className = `flex items-start gap-3 ${isUser ? 'flex-row-reverse' : ''}`;
            
            // Avatar
            const avatar = document.createElement('div');
            avatar.className = `w-8 h-8 rounded-full flex items-center justify-center shrink-0 border ${
                isUser ? 'bg-slate-800 border-slate-700 text-white' : 
                isError ? 'bg-red-100 border-red-200 text-red-600' : 'bg-blue-100 border-blue-200 text-blue-600'
            }`;
            avatar.innerHTML = `<span class="text-xs font-bold">${isUser ? 'U' : isError ? '!' : 'G'}</span>`;

            // Bubble
            const bubble = document.createElement('div');
            bubble.className = `${
                isUser ? 'bg-slate-800 text-white rounded-tr-none' : 
                isError ? 'bg-red-50 text-red-700 border border-red-200 rounded-tl-none' : 'bg-white border border-slate-200 text-slate-700 rounded-tl-none'
            } rounded-2xl px-4 py-3 shadow-sm max-w-[85%] text-sm leading-relaxed ${
                isUser || isError ? 'whitespace-pre-wrap' : 'markdown-body'
            }`;

            if (!isUser && !isError && window.marked && window.DOMPurify) {
                bubble.innerHTML = DOMPurify.sanitize(marked.parse(text, { gfm: true, breaks: true }));
            } else {
                bubble.textContent = text;
            }

            div.appendChild(avatar);
            div.appendChild(bubble);
            chatContainer.appendChild(div);
        }

        function appendTypingIndicator() {
            const id = 'typing-' + Date.now();
            const div = document.createElement('div');
            div.id = id;
            div.className = `flex items-start gap-3`;
            div.innerHTML = `
                <div class="w-8 h-8 rounded-full bg-blue-100 flex items-center justify-center shrink-0 border border-blue-200">
                    <span class="text-blue-600 text-xs font-bold">G</span>
                </div>
                <div class="bg-white border border-slate-200 rounded-2xl rounded-tl-none px-4 py-4 shadow-sm max-w-[85%] flex items-center">
                    <div class="typing-indicator flex items-center">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            chatContainer.appendChild(div);
            return id;
        }

        function removeElement(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        function scrollToBottom() {
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }
    </script>
</body>
</html>
